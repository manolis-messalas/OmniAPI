#spring.profiles.default=h2
server.port=9090

#SET WS PATH
spring.webservices.path=/api/ws

# TLS (opt-in — see AGENTS.md "HTTPS / TLS"). When enabled, server.port (9090) serves HTTPS
# and an additional plain-HTTP connector on server.http.port redirects to it.
server.ssl.enabled=${SSL_ENABLED:false}
server.ssl.key-store=file:${SSL_KEYSTORE_PATH:./keystore/omniapi.p12}
server.ssl.key-store-password=${SSL_KEYSTORE_PASSWORD:}
server.ssl.key-store-type=PKCS12
server.ssl.key-alias=omniapi
server.http.port=${HTTP_PORT:8080}

# OAuth2 Authorization Server (self-hosted) - issuer/redirect URIs are public, non-secret config
omniapi.oauth2.issuer-uri=http://localhost:9090
omniapi.oauth2.spa-redirect-uri=http://localhost:5173/oauth/callback
omniapi.oauth2.spa-post-logout-redirect-uri=http://localhost:5173/login

# General Spring Security debug logs
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=INFO

management.endpoint.health.show-details=always
management.endpoints.web.exposure.include=health,info

# Task Scheduling (applies to all profiles; the SchedulingConfig bean may override pool/thread settings)
spring.task.scheduling.pool.size=2
spring.task.scheduling.thread-name-prefix=idempotency-cleanup-
# Enable Java 23 virtual threads for Tomcat request handling and async tasks
spring.threads.virtual.enabled=true