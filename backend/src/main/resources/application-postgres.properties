spring.application.name=omniAPI

# PostgreSQL configuration
spring.config.import=optional:file:.env[.properties]

omniapi.admin.username=${OMNIAPI_ADMIN_USERNAME:admin}
omniapi.admin.password=${OMNIAPI_ADMIN_PASSWORD:admin}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/booksdb}
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=${POSTGRES_USER}
spring.datasource.password=${POSTGRES_PASSWORD}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.sql.init.mode=never

# LOGGING
logging.level.org.springframework.orm.jpa=WARN
logging.level.org.springframework.transaction=WARN
logging.level.org.springframework=INFO
logging.level.org.hibernate=WARN
spring.jpa.show-sql=true
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=WARN

management.endpoint.health.show-details=always
management.endpoints.web.exposure.include=health,info