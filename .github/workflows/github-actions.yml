name: Java CI with Maven

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

permissions:
  contents: read
  packages: write
  security-events: write
  actions: read

env:
  APP_IMAGE: ghcr.io/${{ github.repository_owner }}/omniapi
  POSTGRES_IMAGE: ghcr.io/${{ github.repository_owner }}/omniapi-postgres
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/omniapi-frontend

# ============================================================
# JOB 1: UNIT TESTS (Backend)
# Fast feedback loop. H2 in-memory, no Docker required.
# Runs on every push and PR. If this fails nothing else runs.
# ============================================================
jobs:
  unit-tests:
    runs-on: ubuntu-latest
    environment: ci

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 23
        uses: actions/setup-java@v4
        with:
          java-version: '23'
          distribution: temurin
          cache: maven

      - name: Grant execute permissions to mvnw
        run: chmod +x mvnw

      - name: Run unit tests (H2)
        run: ./mvnw -B test -Ph2

      - name: Upload unit test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: target/surefire-reports/

  # ============================================================
  # JOB 2: FRONTEND CI
  # Validates the React app builds successfully.
  # Runs in parallel with unit-tests — no dependency between them.
  # No tests yet — npm install + build only.
  # Produces a dist artifact for Docker image build.
  # ============================================================
  frontend-ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Verify dist was produced
        working-directory: frontend
        run: |
          ls -la dist/
          [ -f dist/index.html ] || (echo "ERROR: index.html not found in dist/" && exit 1)

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          if-no-files-found: error

  # ============================================================
  # JOB 3: BUILD AND PUSH IMAGES
  # Only runs after BOTH unit-tests AND frontend-ci pass.
  # Only pushes images on master — not on PRs.
  # Produces versioned image tags for use by downstream jobs.
  # ============================================================
  build-and-push:
    needs: [ unit-tests, frontend-ci ]
    runs-on: ubuntu-latest
    environment: ci

    outputs:
      app_image: ${{ steps.set-outputs.outputs.app_image }}
      postgres_image: ${{ steps.set-outputs.outputs.postgres_image }}
      frontend_image: ${{ steps.set-outputs.outputs.frontend_image }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 23
        uses: actions/setup-java@v4
        with:
          java-version: '23'
          distribution: temurin
          cache: maven

      - name: Grant execute permissions to mvnw
        run: chmod +x mvnw

      - name: Build JAR (skip tests — already ran in unit-tests job)
        run: ./mvnw -B clean package -DskipTests

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push application image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.ref == 'refs/heads/master' }}
          tags: |
            ${{ env.APP_IMAGE }}:latest
            ${{ env.APP_IMAGE }}:${{ github.sha }}
            ${{ env.APP_IMAGE }}:${{ github.ref_name }}-${{ github.sha }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Postgres image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/postgres/Dockerfile.postgres
          push: ${{ github.ref == 'refs/heads/master' }}
          tags: |
            ${{ env.POSTGRES_IMAGE }}:latest
            ${{ env.POSTGRES_IMAGE }}:${{ github.sha }}
            ${{ env.POSTGRES_IMAGE }}:${{ github.ref_name }}-${{ github.sha }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: ${{ github.ref == 'refs/heads/master' }}
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
            ${{ env.FRONTEND_IMAGE }}:${{ github.ref_name }}-${{ github.sha }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set output image refs
        id: set-outputs
        run: |
          echo "app_image=${{ env.APP_IMAGE }}:${{ github.sha }}" >> $GITHUB_OUTPUT
          echo "postgres_image=${{ env.POSTGRES_IMAGE }}:${{ github.sha }}" >> $GITHUB_OUTPUT
          echo "frontend_image=${{ env.FRONTEND_IMAGE }}:${{ github.sha }}" >> $GITHUB_OUTPUT

  # ============================================================
  # JOB 4: INTEGRATION TESTS (Backend)
  # Runs against the actual pushed image — not a source rebuild.
  # Tests the artifact we ship, not a recompile.
  # Runs in parallel with security-scan and frontend-smoke-test.
  # ============================================================
  integration-tests:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: ci
    if: github.ref == 'refs/heads/master'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 23
        uses: actions/setup-java@v4
        with:
          java-version: '23'
          distribution: temurin
          cache: maven

      - name: Grant execute permissions to mvnw
        run: chmod +x mvnw

      - name: Pull Postgres image
        run: docker pull ${{ needs.build-and-push.outputs.postgres_image }}

      - name: Pull application image
        run: docker pull ${{ needs.build-and-push.outputs.app_image }}

      - name: Create docker network
        run: docker network create omniapi-net || true

      - name: Start PostgreSQL container
        run: |
          docker run -d \
            --name test-postgres \
            --network omniapi-net \
            -p 5432:5432 \
            -e POSTGRES_USER=${{ secrets.POSTGRES_USER }} \
            -e POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }} \
            -e POSTGRES_DB=${{ secrets.POSTGRES_DB }} \
            ${{ needs.build-and-push.outputs.postgres_image }}
          sleep 3
          docker inspect test-postgres --format='{{.State.Status}}' | grep -q "running" || \
            (echo "=== Postgres failed to start ===" && docker logs test-postgres && exit 1)

      - name: Wait for Postgres to be healthy
        run: |
          for i in {1..30}; do
            docker exec test-postgres pg_isready \
              -U ${{ secrets.POSTGRES_USER }} \
              -d ${{ secrets.POSTGRES_DB }} && break || sleep 2
          done
          docker exec test-postgres pg_isready \
            -U ${{ secrets.POSTGRES_USER }} \
            -d ${{ secrets.POSTGRES_DB }} || \
            (echo "=== Postgres never became ready ===" && docker logs test-postgres && exit 1)

      - name: Run integration tests (Postgres profile)
        run: ./mvnw -B verify -Ppostgres

      - name: Upload JaCoCo coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/

      - name: Upload integration test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: |
            target/surefire-reports/
            target/failsafe-reports/

      - name: Start application container
        run: |
          docker run -d \
            --name test-app \
            --network omniapi-net \
            -e SPRING_PROFILES_ACTIVE=postgres \
            -e SPRING_DATASOURCE_URL=jdbc:postgresql://test-postgres:5432/${{ secrets.POSTGRES_DB }} \
            -e SPRING_DATASOURCE_USERNAME=${{ secrets.POSTGRES_USER }} \
            -e SPRING_DATASOURCE_PASSWORD=${{ secrets.POSTGRES_PASSWORD }} \
            -p 9090:9090 \
            ${{ needs.build-and-push.outputs.app_image }}
          sleep 5
          docker inspect test-app --format='{{.State.Status}}' | grep -q "running" || \
            (echo "=== App failed to start ===" && docker logs test-app && exit 1)

      - name: Wait for application to be ready
        run: |
          for i in {1..60}; do
            if curl -sSf http://localhost:9090/actuator/health >/dev/null 2>&1; then
              echo "App is up and responding"
              exit 0
            fi
            echo "Attempt $i/60: app not ready yet..."
            sleep 2
          done
          echo "ERROR: App never became ready after 120 seconds"
          docker logs test-app
          exit 1

      - name: Smoke test — health endpoint
        run: |
          HEALTH=$(curl -sf http://localhost:9090/actuator/health)
          echo $HEALTH | python3 -m json.tool
          echo $HEALTH | python3 -c "
          import sys, json
          h = json.load(sys.stdin)
          assert h['status'] == 'UP', f'App status is not UP: {h[\"status\"]}'
          db = h.get('components', {}).get('db', {})
          assert db.get('status') == 'UP', f'DB status is not UP: {db.get(\"status\")}'
          print('✓ App is UP')
          print('✓ Database is UP')
          "

      - name: Verify DB state — authors seeded correctly
        run: |
          COUNT=$(docker exec test-postgres psql \
            -U ${{ secrets.POSTGRES_USER }} \
            -d ${{ secrets.POSTGRES_DB }} \
            -t -c "SELECT count(*) FROM author;" | tr -d ' ')
          echo "Author count: $COUNT"
          [ "$COUNT" -gt "0" ] || (echo "ERROR: No authors found in DB" && exit 1)

      - name: Diagnose container failure
        if: failure()
        run: |
          echo "=== Container Status ==="
          docker ps -a
          echo ""
          echo "=== Postgres Logs ==="
          docker logs test-postgres 2>&1 || echo "No postgres logs"
          echo ""
          echo "=== App Logs ==="
          docker logs test-app 2>&1 || echo "No app logs"
          echo ""
          echo "=== Network ==="
          docker network inspect omniapi-net 2>&1 || echo "Network not found"

      - name: Collect container logs on failure
        if: failure()
        run: |
          docker logs test-app > test-app.log 2>/dev/null || true
          docker logs test-postgres > test-postgres.log 2>/dev/null || true
          docker inspect test-app > test-app.inspect 2>/dev/null || true
          docker inspect test-postgres > test-postgres.inspect 2>/dev/null || true

      - name: Upload container logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: container-logs
          path: |
            test-app.log
            test-postgres.log
            test-app.inspect
            test-postgres.inspect

      - name: Cleanup
        if: always()
        run: |
          docker rm -f test-app || true
          docker rm -f test-postgres || true
          docker network rm omniapi-net || true

  # ============================================================
  # JOB 5: FRONTEND SMOKE TEST
  # Validates the frontend Docker image starts and serves content.
  # Runs in parallel with integration-tests and security-scan.
  # ============================================================
  frontend-smoke-test:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: ci
    if: github.ref == 'refs/heads/master'

    steps:
      - name: Pull frontend image
        run: docker pull ${{ needs.build-and-push.outputs.frontend_image }}

      - name: Start frontend container
        run: |
          docker run -d \
            --name test-frontend \
            -p 80:80 \
            ${{ needs.build-and-push.outputs.frontend_image }}
          sleep 3
          docker inspect test-frontend --format='{{.State.Status}}' | grep -q "running" || \
            (echo "=== Frontend failed to start ===" && docker logs test-frontend && exit 1)

      - name: Wait for frontend to serve content
        run: |
          for i in {1..30}; do
            if curl -sSf http://localhost:80 >/dev/null 2>&1; then
              echo "Frontend is serving content"
              exit 0
            fi
            echo "Attempt $i/30: frontend not ready yet..."
            sleep 2
          done
          echo "ERROR: Frontend never became ready"
          docker logs test-frontend
          exit 1

      - name: Verify index.html is served
        run: |
          RESPONSE=$(curl -sf http://localhost:80)
          echo "$RESPONSE" | grep -q "<html" || \
            (echo "ERROR: Response does not contain HTML" && exit 1)
          echo "✓ Frontend serving valid HTML"

      - name: Cleanup
        if: always()
        run: docker rm -f test-frontend || true

  # ============================================================
  # JOB 6: SECURITY SCAN
  # Runs in parallel with integration-tests and frontend-smoke-test.
  # Scans dependencies, Docker images, and git history for secrets.
  # Results appear in GitHub Security → Code Scanning tab.
  # ============================================================
  security-scan:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: ci
    if: github.ref == 'refs/heads/master'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 23
        uses: actions/setup-java@v4
        with:
          java-version: '23'
          distribution: temurin
          cache: maven

      - name: Grant execute permissions to mvnw
        run: chmod +x mvnw

      - name: Resolve Maven dependencies into local cache
        run: ./mvnw -B dependency:resolve dependency:resolve-plugins -q

      - name: Scan filesystem for dependency CVEs
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-fs.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Scan backend image for CVEs
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'image'
          image-ref: ${{ needs.build-and-push.outputs.app_image }}
          format: 'sarif'
          output: 'trivy-app-image.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Scan frontend image for CVEs
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'image'
          image-ref: ${{ needs.build-and-push.outputs.frontend_image }}
          format: 'sarif'
          output: 'trivy-frontend-image.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload filesystem scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-fs.sarif'
          category: 'trivy-filesystem'

      - name: Upload backend image scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-app-image.sarif'
          category: 'trivy-app-image'

      - name: Upload frontend image scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-frontend-image.sarif'
          category: 'trivy-frontend-image'

      - name: Scan git history for leaked secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ============================================================
  # JOB 7: VALIDATE
  # Final gate. Runs only after integration-tests, frontend-smoke-test
  # AND security-scan all pass. Confirms the pipeline is fully green.
  # ============================================================
  validate:
    needs: [ integration-tests, frontend-smoke-test, security-scan ]
    runs-on: ubuntu-latest
    environment: ci
    if: github.ref == 'refs/heads/master'

    steps:
      - name: Pipeline summary
        run: |
          echo "========================================"
          echo "  OmniAPI Pipeline Summary"
          echo "========================================"
          echo "  Commit   : ${{ github.sha }}"
          echo "  Branch   : ${{ github.ref_name }}"
          echo "  Actor    : ${{ github.actor }}"
          echo "  App      : ${{ needs.build-and-push.outputs.app_image }}"
          echo "  Postgres : ${{ needs.build-and-push.outputs.postgres_image }}"
          echo "  Frontend : ${{ needs.build-and-push.outputs.frontend_image }}"
          echo ""
          echo "  ✓ Backend unit tests passed"
          echo "  ✓ Frontend build passed"
          echo "  ✓ Images built and pushed"
          echo "  ✓ Backend integration tests passed"
          echo "  ✓ Frontend smoke test passed"
          echo "  ✓ Security scan passed"
          echo "========================================"