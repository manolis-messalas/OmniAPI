name: Java CI with Maven

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

permissions:
  contents: read
  packages: write
  security-events: write
  actions: read
  
env:
  APP_IMAGE: ghcr.io/${{ github.repository_owner }}/omniapi
  POSTGRES_IMAGE: ghcr.io/${{ github.repository_owner }}/omniapi-postgres


jobs:
  build-and-push:
    runs-on: ubuntu-latest
    environment: ci
    
    outputs:
      app_image: ${{ steps.set-outputs.outputs.app_image }}
      postgres_image: ${{ steps.set-outputs.outputs.postgres_image }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 23
        uses: actions/setup-java@v4
        with:
          java-version: '23'
          distribution: temurin
          cache: maven

      - name: Grant execute permissions to mvnw
        run: chmod +x mvnw

      - name: Build project (skip tests)
        run: ./mvnw -B clean package -DskipTests

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push application image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.APP_IMAGE }}:latest
            ${{ env.APP_IMAGE }}:${{ github.sha }}
          platforms: linux/amd64,linux/arm64

      - name: Build and push Postgres image (includes init SQL)
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./docker/postgres/Dockerfile
          push: true
          tags: |
            ${{ env.POSTGRES_IMAGE }}:latest
            ${{ env.POSTGRES_IMAGE }}:${{ github.sha }}
          platforms: linux/amd64,linux/arm64

      - name: Set output image refs
        id: set-outputs
        run: |
          echo "app_image=${{ env.APP_IMAGE }}:${{ github.sha }}" >> $GITHUB_OUTPUT
          echo "postgres_image=${{ env.POSTGRES_IMAGE }}:${{ github.sha }}" >> $GITHUB_OUTPUT

  build-and-test:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: ci
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
  
      - name: Set up JDK 23
        uses: actions/setup-java@v4
        with:
          java-version: '23'
          distribution: temurin
  
      - name: Grant execute permissions to mvnw
        run: chmod +x mvnw

      # Maven verify with Postgres profile will run after Postgres container is ready
  
      - name: Pull Postgres image
        run: docker pull ${{ needs.build-and-push.outputs.postgres_image }}
  
      - name: Create docker network
        run: docker network create omniapi-net || true
  
      - name: Start PostgreSQL container
        run: |
          docker run -d --name test-postgres --network omniapi-net -p 5432:5432 -e POSTGRES_USER=${{ secrets.POSTGRES_USER }} -e POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }} -e POSTGRES_DB=${{ secrets.POSTGRES_DB }} ${{ needs.build-and-push.outputs.postgres_image }}
          sleep 3
          docker inspect test-postgres --format='{{.State.Status}}' | grep -q "running" || (echo "=== Postgres failed to start ===" && docker logs test-postgres && exit 1)

      - name: Wait for Postgres to be ready
        run: |
          for i in {1..30}; do
            docker exec test-postgres pg_isready -U ${{ secrets.POSTGRES_USER }} -d ${{ secrets.POSTGRES_DB }} && break || sleep 2;
          done

      - name : Run Cerberus Security Scan
        uses: docker://dumanoj/cerberus:latest
        with:
          args: scan --path . --output-report.html

      - name: Run Maven verify (generate JaCoCo report)
        run: |
          ./mvnw -B verify -Ppostgres

      - name: Upload JaCoCo coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            target/surefire-reports/
            target/failsafe-reports/
  
      - name: Pull application image
        run: docker pull ${{ needs.build-and-push.outputs.app_image }}
  
      - name: Start application container
        run: |
          docker run -d --name test-app --network omniapi-net -e SPRING_PROFILES_ACTIVE=postgres -e SPRING_DATASOURCE_URL=jdbc:postgresql://test-postgres:5432/${{ secrets.POSTGRES_DB }} -e SPRING_DATASOURCE_USERNAME=${{ secrets.POSTGRES_USER }} -e SPRING_DATASOURCE_PASSWORD=${{ secrets.POSTGRES_PASSWORD }} -p 9090:9090 ${{ needs.build-and-push.outputs.app_image }}
  
      - name: Wait for application HTTP port
        run: |
          for i in {1..60}; do
            if curl -sSf http://localhost:9090/api/rest/authors >/dev/null; then
              echo "app is up"; break
            fi
            sleep 2
          done
  
      - name: Check container health before DB verify
        run: |
          echo "=== Checking Postgres container status ==="
          docker ps --filter name=test-postgres --format "table {{.Names}}\t{{.Status}}"
          echo ""
          echo "=== Checking App container status ==="
          docker ps --filter name=test-app --format "table {{.Names}}\t{{.Status}}"
          echo ""
          echo "=== Testing Postgres connectivity ==="
          docker exec test-postgres pg_isready -U ${{ secrets.POSTGRES_USER }} -d ${{ secrets.POSTGRES_DB }}

      - name: Verify DB has authors
        run: |
          echo "Checking if test-postgres container is running..."
          docker ps --filter name=test-postgres
          echo ""
          echo "Running query..."
          docker exec test-postgres psql -U ${{ secrets.POSTGRES_USER }} -d ${{ secrets.POSTGRES_DB }} -c "SELECT count(*) FROM author;"

      - name: Diagnose container failure
        if: failure()
        run: |
          echo "=== Container Status ==="
          docker ps -a | grep test-postgres || echo "Container not found"
          echo ""
          echo "=== Postgres Container Logs ==="
          docker logs test-postgres 2>&1 || echo "Could not retrieve logs"
          echo ""
          echo "=== Network Status ==="
          docker network inspect omniapi-net 2>&1 || echo "Network not found"
          echo ""
          echo "=== Volume Status ==="
          docker volume ls | grep postgres || echo "No postgres volumes"

      - name: Collect container logs
        if: failure()
        run: |
          docker logs test-app > test-app.log 2>/dev/null || true
          docker logs test-postgres > test-postgres.log 2>/dev/null || true
          docker inspect test-app > test-app.inspect 2>/dev/null || true
          docker inspect test-postgres > test-postgres.inspect 2>/dev/null || true

      - name: Upload container logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: container-logs
          path: |
            test-app.log
            test-postgres.log
            test-app.inspect
            test-postgres.inspect
  
      - name: Cleanup
        if: always()
        run: |
          docker rm -f test-app || true
          docker rm -f test-postgres || true
          docker network rm omniapi-net || true